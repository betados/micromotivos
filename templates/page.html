<!doctype html>
<html class="no-js" lang="{lang}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{title}</title>
{meta}
{styles}
  <meta name="theme-color" content="#fafafa">
  <style>
    /* Return-to-landing link, shared by every model page — this template is the
       one place it lives. Colours are hard-coded rather than read from CSS
       variables so it never depends on a particular model's stylesheet. */
    .site-nav {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 20px 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .site-nav a { color: #666; text-decoration: none; font-size: 0.9rem; }
    .site-nav a:hover { color: #222; text-decoration: underline; }

    /* Figure captions, shared by every model. Italic + a bottom margin larger
       than the top one (caption must sit closer to its image than to the
       paragraph that follows) — both keep captions distinguishable from body
       text on small screens. */
    .app figure {
      margin: 28px 0 40px;
    }
    .app figcaption {
      margin: 6px auto 0;
      color: #666;
      font-size: 0.85rem;
      font-style: italic;
      max-width: 62ch;
      text-align: center;
    }
  </style>
</head>

<body>

  <nav class="site-nav"><a href="../">&larr; micromotivos</a></nav>

  <main class="app">
{content}
  </main>

{scripts}
</body>

</html>

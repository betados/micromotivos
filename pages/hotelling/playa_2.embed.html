<figure class="beach-figure">
  <svg class="beach-svg" viewBox="0 0 600 170" role="img" aria-labelledby="playa2-title playa2-desc">
    <title id="playa2-title">El heladero A se acerca un poco al centro y le roba clientes a B</title>
    <desc id="playa2-desc">
      La playa va de 0 a 1. El heladero azul se ha movido de 1/4 a 3/8, mientras
      que el naranja sigue en 3/4. La frontera de clientes se desplaza de 1/2 a
      9/16: el azul se queda con 9/16 de la playa y el naranja con 7/16.
    </desc>

    <defs>
      <pattern id="hatch-blue-2" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#2f6fed" stroke-width="2.5" opacity="0.5" />
      </pattern>
      <pattern id="hatch-orange-2" width="8" height="8" patternUnits="userSpaceOnUse">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#f08a24" stroke-width="2.5" opacity="0.5" />
      </pattern>
    </defs>

    <!-- The split is the midpoint of ⅜ and ¾ — it has slid from ½ to ⁹⁄₁₆. -->
    <rect x="50" y="55" width="281.25" height="30" fill="#fff" />
    <rect x="50" y="55" width="281.25" height="30" fill="url(#hatch-blue-2)" />
    <rect x="331.25" y="55" width="218.75" height="30" fill="#fff" />
    <rect x="331.25" y="55" width="218.75" height="30" fill="url(#hatch-orange-2)" />
    <rect x="50" y="55" width="500" height="30" fill="none" stroke="#222" stroke-width="1.5" />
    <line x1="331.25" y1="55" x2="331.25" y2="85" stroke="#222" stroke-width="1.5" />

    <!-- Where A used to stand, and the small step it just took -->
    <g class="ghost">
      <path d="M168,32 L182,32 L175,54 Z" />
      <circle cx="175" cy="26" r="8" />
    </g>
    <g class="move">
      <line x1="188" y1="44" x2="221" y2="44" />
      <polygon points="229,44 219,39 219,49" />
    </g>

    <g class="vendor">
      <text x="237.5" y="14" text-anchor="middle" class="vendor-label">Heladero A</text>
      <path d="M230.5,32 L244.5,32 L237.5,54 Z" fill="#e0b070" stroke="#a97c40" stroke-width="1" />
      <circle cx="237.5" cy="26" r="8" fill="#2f6fed" />
    </g>
    <g class="vendor">
      <text x="425" y="14" text-anchor="middle" class="vendor-label">Heladero B</text>
      <path d="M418,32 L432,32 L425,54 Z" fill="#e0b070" stroke="#a97c40" stroke-width="1" />
      <circle cx="425" cy="26" r="8" fill="#f08a24" />
    </g>

    <!-- Axis -->
    <g class="axis">
      <line x1="50" y1="85" x2="50" y2="93" />
      <line x1="175" y1="85" x2="175" y2="93" />
      <line x1="300" y1="85" x2="300" y2="93" />
      <line x1="425" y1="85" x2="425" y2="93" />
      <line x1="550" y1="85" x2="550" y2="93" />
      <text x="50" y="108" text-anchor="middle">0</text>
      <text x="175" y="108" text-anchor="middle">¼</text>
      <text x="300" y="108" text-anchor="middle">½</text>
      <text x="425" y="108" text-anchor="middle">¾</text>
      <text x="550" y="108" text-anchor="middle">1</text>
    </g>

    <!-- The new border, called out because it is the whole point of the move -->
    <g class="border-mark">
      <line x1="331.25" y1="85" x2="331.25" y2="93" />
      <text x="337" y="108">⁹⁄₁₆</text>
    </g>

    <!-- The strip that changed hands: it was B's, now it is A's -->
    <g class="steal">
      <rect x="300" y="53" width="31.25" height="34" />
      <line x1="315.6" y1="87" x2="315.6" y2="126" />
      <text x="315.6" y="142" text-anchor="middle">Robado a B</text>
    </g>
  </svg>
  <figcaption>
    A da un paso hacia el centro y la frontera se va con él. Esa franja cambia de manos sin que B se haya movido.
  </figcaption>
</figure>

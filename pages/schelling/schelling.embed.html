<div class="layout">
  <section class="board">
    <canvas id="grid" width="500" height="500"></canvas>
    <div class="stats">
      <span>Step: <strong id="stat-step">0</strong></span>
      <span>Happy: <strong id="stat-happy">0%</strong></span>
      <span id="stat-status">Ready</span>
    </div>
  </section>

  <section class="panel">
    <div class="control">
      <label for="size">Grid size: <span id="size-val">50</span> &times; <span id="size-val2">50</span></label>
      <input type="range" id="size" min="10" max="100" step="5" value="50">
    </div>

    <div class="control">
      <label for="tolerance">Similarity wanted: <span id="tolerance-val">30%</span></label>
      <input type="range" id="tolerance" min="0" max="100" step="5" value="30">
      <small>An agent is happy if at least this share of its neighbours match its group.</small>
    </div>

    <div class="control">
      <label for="empty">Empty cells: <span id="empty-val">10%</span></label>
      <input type="range" id="empty" min="2" max="40" step="1" value="10">
    </div>

    <div class="control">
      <label for="ratio">Group balance (Blue / Orange): <span id="ratio-val">50 / 50</span></label>
      <input type="range" id="ratio" min="10" max="90" step="5" value="50">
    </div>

    <div class="buttons">
      <button id="run" class="primary">Run</button>
      <button id="step">Step</button>
      <button id="reset">Reset</button>
    </div>

    <div class="control">
      <label for="speed">Speed: <span id="speed-val">Fast</span></label>
      <input type="range" id="speed" min="0" max="500" step="25" value="60">
    </div>
  </section>
</div>

<div class="layout">
  <section class="board">
    <canvas id="grid" width="500" height="500"></canvas>
    <div class="stats">
      <span>Paso: <strong id="stat-step">0</strong></span>
      <span>Felices: <strong id="stat-happy">0%</strong></span>
      <span id="stat-status">Listo</span>
    </div>
  </section>

  <section class="panel">
    <div class="control">
      <label for="size">Tamaño de la cuadrícula: <span id="size-val">50</span> &times; <span id="size-val2">50</span></label>
      <input type="range" id="size" min="10" max="100" step="5" value="50">
    </div>

    <div class="control">
      <label for="tolerance">Similitud deseada: <span id="tolerance-val">30%</span></label>
      <input type="range" id="tolerance" min="0" max="100" step="5" value="30">
      <small>Un agente es feliz si al menos esta proporción de sus vecinos pertenece a su grupo.</small>
    </div>

    <div class="control">
      <label for="empty">Cuadros vacíos: <span id="empty-val">10%</span></label>
      <input type="range" id="empty" min="2" max="40" step="1" value="10">
    </div>

    <div class="control">
      <label for="ratio">Balance de grupos (Azul / Naranja): <span id="ratio-val">50 / 50</span></label>
      <input type="range" id="ratio" min="10" max="90" step="5" value="50">
    </div>

    <div class="buttons">
      <button id="run" class="primary">Ejecutar</button>
      <button id="step">Avanzar</button>
      <button id="reset">Reiniciar</button>
    </div>

    <div class="control">
      <label for="speed">Velocidad: <span id="speed-val">Rápida</span></label>
      <input type="range" id="speed" min="0" max="500" step="25" value="60">
    </div>
  </section>
</div>
